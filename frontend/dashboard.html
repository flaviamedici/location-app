<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

  <body>
    <header>
      <h2>Nearby Connect</h2>

      <div class="user-info">
        <span id="userName"></span>
        <button onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="dashboard">
      <div class="map-container">
        <h3>Users Near You</h3>

        <div id="map"></div>

        <div id="locationInput" style="display: none; margin-top: 10px">
          <p>Location access denied. Enter your city and state:</p>
          <input type="text" id="manualCity" placeholder="City, State" />
          <button onclick="searchManualLocation()">Find People</button>
          <p class="hint">Examples: Seattle, WA | Bellevue, WA | Redmond, WA</p>
        </div>
      </div>

      <div class="users-container">
        <h3>People Nearby</h3>

        <div class="filter-row">
          <input
            type="text"
            id="filterInput"
            placeholder="Filter by interest..."
            onkeyup="filterUsers()"
          />
          <button onclick="filterUsers()">Filter</button>
        </div>

        <div id="usersList"></div>
      </div>
    </div>

    <div id="profileModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>

        <h2 id="profileName"></h2>

        <p><strong>Age:</strong> <span id="profileAge"></span></p>

        <p><strong>Gender:</strong> <span id="profileGender"></span></p>

        <p><strong>City:</strong> <span id="profileCity"></span></p>

        <p><strong>Interests:</strong> <span id="profileInterests"></span></p>
      </div>
    </div>
    <div id="chatContainer">
      <h3>Community Chat</h3>

      <div id="messages"></div>

      <input id="messageInput" placeholder="Type a message" />

      <button onclick="sendMessage()">Send</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
