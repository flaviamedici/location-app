<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="app.js" defer></script>
  </head>

  <body>
    <header>
      <div class="header-left">
        <h2>Nearby Connect</h2>
        <nav class="top-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="dashboard.html" class="nav-link active">Dashboard</a>
          <a href="about.html" class="nav-link">About</a>
        </nav>
      </div>

      <div class="user-info">
        <span id="userName"></span>
        <button onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="dashboard">
      <div class="map-container">
        <h3>Users Near You</h3>

        <div id="locationInput" style="margin-top: 10px">
          <p>Enter your city and state:</p>
          <input type="text" id="manualCity" placeholder="City, State" />
          <button onclick="searchManualLocation()">Find People</button>
          <p class="hint">Examples: Seattle, WA | Bellevue, WA | Redmond, WA</p>
        </div>

        <div id="map"></div>
      </div>

      <div class="users-container">
        <h3>People Nearby</h3>

        <div class="filter-row">
          <input
            type="text"
            id="filterInput"
            placeholder="Filter by interest..."
            onkeyup="filterUsers()"
          />
          <button onclick="filterUsers()">Filter</button>
        </div>

        <div id="usersList"></div>
      </div>
    </div>

    <div id="profileModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>

        <h2 id="profileName"></h2>

        <p><strong>Age:</strong> <span id="profileAge"></span></p>

        <p><strong>Gender:</strong> <span id="profileGender"></span></p>

        <p><strong>City:</strong> <span id="profileCity"></span></p>

        <p><strong>Interests:</strong> <span id="profileInterests"></span></p>

        <div class="message-box">
          <div class="message-label">Send a message</div>
          <textarea
            id="messageText"
            rows="4"
            placeholder="Write a quick hello..."
          ></textarea>
          <button id="sendMessageButton" type="button">Send</button>
          <p id="messageStatus" class="message-status"></p>
        </div>
      </div>
    </div>
  </body>
</html>
