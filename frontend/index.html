<!doctype html>
<html>
  <head>
    <title>Nearby Connect</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="card" id="registerCard">
        <h1>Nearby Connect</h1>
        <p class="subtitle">Find people around you</p>

        <input type="email" id="email" placeholder="Email" />
        <input type="text" id="first_name" placeholder="First Name" />
        <input type="text" id="last_name" placeholder="Last Name" />
        <input type="number" id="age" placeholder="Age" />

        <select id="gender">
          <option value="">Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>

        <input type="text" id="city" placeholder="City" />

        <input
          type="text"
          id="interests"
          placeholder="Interests (comma separated)"
        />

        <button onclick="registerUser()">Create Account</button>
        <button onclick="demoLogin()">Continue as Demo User</button>
        <p class="subtitle" style="margin-top: 16px; font-size: 0.95rem">
          Already have an account?
          <a href="#" onclick="showLogin(event)">Login here</a>
        </p>
      </div>

      <div class="card" id="loginCard" style="display: none">
        <h1>Login</h1>
        <p class="subtitle">Existing users sign in here</p>

        <input type="email" id="loginEmail" placeholder="Email" />
        <button onclick="loginUser()">Login</button>
        <p class="subtitle" style="margin-top: 16px; font-size: 0.95rem">
          Need an account?
          <a href="#" onclick="showRegister(event)">Register here</a>
        </p>
      </div>
    </div>

    <script>
      window.onload = function () {
        if (localStorage.getItem("currentUser")) {
          window.location.href = "dashboard.html";
        }
      };

      function getSavedUsers() {
        return JSON.parse(localStorage.getItem("savedUsers") || "[]");
      }

      function saveUsers(users) {
        localStorage.setItem("savedUsers", JSON.stringify(users));
      }

      function registerUser() {
        const user = {
          email: document.getElementById("email").value.trim(),
          first_name: document.getElementById("first_name").value.trim(),
          last_name: document.getElementById("last_name").value.trim(),
          age: document.getElementById("age").value,
          gender: document.getElementById("gender").value,
          city: document.getElementById("city").value.trim(),
          interests: document.getElementById("interests").value,
        };

        if (!user.email || !user.first_name || !user.last_name) {
          alert("Please fill in your email, first name, and last name.");
          return;
        }

        const users = getSavedUsers();
        const existing = users.find((u) => u.email === user.email);

        if (existing) {
          alert(
            "An account with that email already exists. Please login instead.",
          );
          showLogin();
          return;
        }

        users.push(user);
        saveUsers(users);
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
      }

      function loginUser() {
        const email = document.getElementById("loginEmail").value.trim();
        const users = getSavedUsers();
        const user = users.find((u) => u.email === email);

        if (!user) {
          alert("No account found with that email. Please register first.");
          return;
        }

        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
      }

      function demoLogin() {
        const user = {
          first_name: "Demo",
          last_name: "User",
          age: 28,
          gender: "Prefer not to say",
          city: "Seattle",
          interests: "Travel, Music, Tech",
        };

        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
      }

      function showLogin(event) {
        if (event) event.preventDefault();
        document.getElementById("registerCard").style.display = "none";
        document.getElementById("loginCard").style.display = "block";
      }

      function showRegister(event) {
        if (event) event.preventDefault();
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("registerCard").style.display = "block";
      }
    </script>
  </body>
</html>
